#cloud-config
hostname: ns-00
fqdn: ns-00.nip.io

package_update: true
package_upgrade: true

packages:
  - "@development-tools"
  - bind-utils
  - btop
  - bzip2
  - curl
  - file
  - git-lfs
  - golang
  - htop
  - iputils
  - jq
  - neovim
  - net-tools
  - netcat
  - python3
  - python3-devel
  - python3-pip
  - python3-virtualenv
  - ripgrep
  - rsync
  - socat
  - sudo
  - tar
  - tcpdump
  - tmux
  - tree
  - unzip
  - zstd

users:
  - name: cunnie
    gecos: Brian Cunnie
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    groups: wheel
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIWiAzxc4uovfaphO0QVC2w00YmzrogUpjAzvuqaQ9tD

write_files:
  - path: /etc/systemd/system/floating-ips.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Assign floating IPs to eth0
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/sbin/ip addr add 5.78.28.211/32 dev eth0
      ExecStart=/sbin/ip -6 addr add 2a01:4ff:1f2:10d::/64 dev eth0
      # one second isn't enough, two is, three to be safe
      ExecStart=/usr/bin/sleep 3

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/sslip.io-dns.service
    permissions: "0644"
    content: |
      [Unit]
      Description=sslip.io DNS server
      Documentation=https://sslip.io/
      After=network-online.target qemu-guest-agent floating-ips.service
      Wants=network-online.target
      Requires=floating-ips.service

      [Service]
      ExecStart=/usr/bin/sslip.io-dns-server
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

runcmd:
  - curl -L -o /usr/bin/sslip.io-dns-server https://github.com/cunnie/sslip.io/releases/download/5.1.3/sslip.io-dns-server-linux-amd64
  - chmod +x /usr/bin/sslip.io-dns-server
  - systemctl daemon-reload
  - systemctl enable floating-ips.service
  - systemctl enable sslip.io-dns.service
  # ignore "The unit files have no installation config..." in cloud-init-output.log
  - systemctl disable systemd-binfmt.service

power_state:
  mode: reboot
  message: Rebooting to pick up new kernel, if any
  timeout: 60
  condition: true
