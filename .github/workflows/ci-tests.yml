name: CI Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    container:
      image: cunnie/fedora-golang
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test
        env:
          GOFLAGS: -buildvcs=false
        run: HOME=/root ginkgo -r -p --skip-package=spec .
